name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Install Calibre
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq calibre > /dev/null 2>&1

      - name: Build chapters manifest
        working-directory: site
        run: node scripts/build-chapters.mjs

      - name: Generate MOBI downloads
        working-directory: site
        run: node scripts/build-mobi.mjs

      - name: Build site
        working-directory: site
        run: npx astro build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
